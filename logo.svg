<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Signature line splitting into two paths -->
  <path d="M8 40 Q16 20 24 32 Q28 38 32 32" fill="none" stroke="#00d4aa" stroke-width="3" stroke-linecap="round"/>
  <!-- Top split: nonce path -->
  <path d="M32 32 Q36 24 42 20 L56 14" fill="none" stroke="#f7931a" stroke-width="3" stroke-linecap="round"/>
  <!-- Bottom split: signature path -->
  <path d="M32 32 Q36 40 42 44 L56 50" fill="none" stroke="#00d4aa" stroke-width="3" stroke-linecap="round"/>
  <!-- Split point dot -->
  <circle cx="32" cy="32" r="3.5" fill="#ffd700"/>
  <!-- Key at the convergence -->
  <circle cx="56" cy="32" r="6" fill="none" stroke="#ffd700" stroke-width="2"/>
  <line x1="56" y1="26" x2="56" y2="38" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="32" x2="62" y2="32" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
</svg>
